name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # หรือชื่อกิ่งหลักของคุณ เช่น master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build # คำสั่งนี้จะสร้างโฟลเดอร์ 'out'

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './out' # ชี้ไปที่โฟลเดอร์ out ของ Next.js

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
